services:
  app:
    build: ./go-app
    container_name: go-test-app
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PASSWORD: secret
    depends_on:
      - db
  db:
    build: ./db
    container_name: go-test-postgres
    ports:
      - 5432:5432
    environment:
      POSTGRES_USER: "user"
      POSTGRES_PASSWORD: "postgres"
    volumes:
      - db-store:/var/lib/postgresql/data
volumes:
  db-store:
